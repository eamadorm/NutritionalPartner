steps:
  # 1. Python Linting (Ruff)
  - name: "ghcr.io/astral-sh/ruff:latest"
    args: ["check", "."]
    id: "python-lint"

  # 2. Python Security (Bandit - High Severity Only)
  - name: "python:3.13-slim"
    entrypoint: /bin/bash
    args:
      - -c
      - |
        pip install bandit
        bandit -lll -r .
    id: "python-security"

  # 3. Secret Scanning (Gitleaks)
  - name: "zricethezav/gitleaks:latest"
    args: ["detect", "--source", ".", "--verbose"]
    id: "secret-scan"

  # 4. Multi-language Security (Semgrep)
  - name: "returntocorp/semgrep"
    args: ["semgrep", "scan", "--config", "auto", "--error"]
    id: "semgrep-scan"

  # 5. Frontend Linting (ESLint)
  - name: "node:22-slim"
    entrypoint: /bin/bash
    args:
      - -c
      - |
        cd frontend
        npm install -g pnpm
        pnpm install --no-frozen-lockfile
        pnpm lint
    id: "frontend-lint"

options:
  logging: CLOUD_LOGGING_ONLY
