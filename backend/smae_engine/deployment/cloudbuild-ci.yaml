substitutions:
  _REGION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # 1. Build and push Docker image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/nutritional-partner-images/smae-engine:$SHORT_SHA
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/nutritional-partner-images/smae-engine:latest
      - -f
      - backend/smae_engine/deployment/Dockerfile
      - backend/
    id: "docker-image-build"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - --all-tags
      - $_REGION-docker.pkg.dev/$PROJECT_ID/nutritional-partner-images/smae-engine
    id: "docker-image-push"
    waitFor:
      - "docker-image-build"

  # 2. Terraform Lifecycle: Initialization and Application
  - name: "hashicorp/terraform:1.9"
    entrypoint: sh
    args:
      - -c
      - |
        cd backend/smae_engine/deployment
        terraform init \
          -backend-config="bucket=$PROJECT_ID-tf-states" \
          -backend-config="prefix=tfstates/smae_engine/tf.state"
    id: "terraform-init"
    waitFor:
      - "docker-image-push"

  - name: "hashicorp/terraform:1.9"
    entrypoint: sh
    args:
      - -c
      - |
        cd backend/smae_engine/deployment
        terraform apply \
          -auto-approve \
          -var="project_id=$PROJECT_ID" \
          -var="region=$_REGION" \
          -var="image_tag=$SHORT_SHA"
    id: "terraform-apply"
    waitFor:
      - "terraform-init"
